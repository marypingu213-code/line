    function App() {
      // === 狀態管理 ===
      const [mode, setMode] = useState('trace'); 
      const [difficulty, setDifficulty] = useState(60); 
      const [currentPatternId, setCurrentPatternId] = useState(PATTERNS[0].id);
      const [gameState, setGameState] = useState('idle'); 
      
      // === 參考點 ===
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const drawingRef = useRef({
        isDrawing: false,
        lastX: 0,
        lastY: 0,
        shapeData: null 
      });

      const currentPattern = PATTERNS.find(p => p.id === currentPatternId) || PATTERNS[0];

      // === 初始化與繪製背景 ===
      const initCanvas = () => {
        const canvas = canvasRef.current;
        const container = containerRef.current;
        if (!canvas || !container) return;

        const dpr = window.devicePixelRatio || 1;
        const rect = container.getBoundingClientRect();
        
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        
        const shapeData = currentPattern.getShape(rect.width, rect.height);
        drawingRef.current.shapeData = shapeData;

        drawBase(ctx, rect.width, rect.height, shapeData);
      };

      const drawBase = (ctx, w, h, shapeData) => {
        ctx.clearRect(0, 0, w, h);
        const { path, start, end } = shapeData;

        if (mode === 'wire') {
          ctx.strokeStyle = '#d4b88a'; 
          ctx.lineWidth = difficulty;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.stroke(path);

          ctx.strokeStyle = '#c2a172';
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 10]);
          ctx.stroke(path);
          ctx.setLineDash([]); 
        } else {
          ctx.strokeStyle = '#8b6f4e';
          ctx.lineWidth = 4;
          ctx.setLineDash([15, 15]);
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.stroke(path);
          ctx.setLineDash([]);
        }

        const drawCircle = (x, y, color, label) => {
          ctx.beginPath();
          ctx.arc(x, y, 20, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.lineWidth = 3;
          ctx.strokeStyle = '#fff';
          ctx.stroke();

          ctx.fillStyle = '#fff';
          ctx.font = 'bold 14px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, x, y);
        };

        drawCircle(start.x, start.y, '#22c55e', '起');
        drawCircle(end.x, end.y, '#ef4444', '終');
      };

      useEffect(() => {
        initCanvas();
        setGameState('idle');
      }, [mode, currentPatternId, difficulty]);

      useEffect(() => {
        window.addEventListener('resize', initCanvas);
        return () => window.removeEventListener('resize', initCanvas);
      }, [currentPatternId, mode]); 

      const getPointerPos = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: clientX - rect.left,
          y: clientY - rect.top
        };
      };

      const checkCollision = (ctx, x, y) => {
        const { shapeData } = drawingRef.current;
        if (!shapeData) return false;

        ctx.save();
        ctx.lineWidth = difficulty;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        const isSafe = ctx.isPointInStroke(shapeData.path, x, y);
        ctx.restore();

        const distToStart = Math.hypot(x - shapeData.start.x, y - shapeData.start.y);
        const distToEnd = Math.hypot(x - shapeData.end.x, y - shapeData.end.y);

        return isSafe || distToStart < 25 || distToEnd < 25;
      };

      const handlePointerDown = (e) => {
        if (gameState === 'failed' || gameState === 'success') return;
        
        const { x, y } = getPointerPos(e);
        const { shapeData } = drawingRef.current;
        
        const distToStart = Math.hypot(x - shapeData.start.x, y - shapeData.start.y);
        if (distToStart < 30) {
          setGameState('playing');
          drawingRef.current.isDrawing = true;
          drawingRef.current.lastX = x;
          drawingRef.current.lastY = y;
          initCanvas(); 
        }
      };

      const handlePointerMove = (e) => {
        if (!drawingRef.current.isDrawing || gameState !== 'playing') return;
        if(e.cancelable) e.preventDefault(); 

        const { x, y } = getPointerPos(e);
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        ctx.beginPath();
        ctx.moveTo(drawingRef.current.lastX, drawingRef.current.lastY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = '#5a3d24'; 
        ctx.lineWidth = mode === 'wire' ? 8 : 12;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();

        drawingRef.current.lastX = x;
        drawingRef.current.lastY = y;

        if (mode === 'wire') {
          const isSafe = checkCollision(ctx, x, y);
          if (!isSafe) {
            drawingRef.current.isDrawing = false;
            setGameState('failed');
            return;
          }
        }

        const { shapeData } = drawingRef.current;
        const distToEnd = Math.hypot(x - shapeData.end.x, y - shapeData.end.y);
        if (distToEnd < 25) {
          drawingRef.current.isDrawing = false;
          setGameState('success');
        }
      };

      const handlePointerUp = () => {
        if (drawingRef.current.isDrawing && gameState === 'playing') {
          drawingRef.current.isDrawing = false;
          if (mode === 'wire') {
            setGameState('failed'); 
          }
        }
      };

      const handleRetry = () => {
        setGameState('idle');
        initCanvas();
      };

      return (
        <div className="flex flex-col h-screen bg-[#f4e8d3] font-sans text-stone-800">
          <header className="bg-stone-800 text-[#f4e8d3] p-4 flex flex-col md:flex-row items-center justify-between shadow-md z-10">
            <div className="flex items-center gap-3 mb-3 md:mb-0">
              <div className="bg-[#d4b88a] p-2 rounded-lg text-stone-900">
                <Triangle size={24} />
              </div>
              <h1 className="text-xl md:text-2xl font-bold tracking-wider">納斯卡線 運筆大挑戰</h1>
            </div>

            <div className="flex bg-stone-700 p-1 rounded-xl">
              <button
                onClick={() => setMode('trace')}
                className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-colors ${
                  mode === 'trace' ? 'bg-[#d4b88a] text-stone-900 font-bold' : 'text-stone-300 hover:bg-stone-600'
                }`}
              >
                <Pencil size={18} />
                描繪練習
              </button>
              <button
                onClick={() => setMode('wire')}
                className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-colors ${
                  mode === 'wire' ? 'bg-amber-400 text-stone-900 font-bold' : 'text-stone-300 hover:bg-stone-600'
                }`}
              >
                <Zap size={18} />
                電流急急棒
              </button>
            </div>
          </header>

          <div className="flex flex-1 flex-col md:flex-row overflow-hidden">
            <aside className="w-full md:w-80 bg-[#ebdcb7] border-r border-[#d4b88a] flex flex-col overflow-y-auto">
              <div className="p-5 border-b border-[#d4b88a]">
                <h2 className="font-bold text-lg mb-3 flex items-center gap-2">
                  <Play size={18} />
                  選擇挑戰圖形
                </h2>
                <div className="grid grid-cols-1 gap-2">
                  {PATTERNS.map((pattern) => (
                    <button
                      key={pattern.id}
                      onClick={() => setCurrentPatternId(pattern.id)}
                      className={`flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${
                        currentPatternId === pattern.id 
                        ? 'border-stone-800 bg-[#d4b88a] font-bold shadow-sm' 
                        : 'border-transparent bg-[#f4e8d3] hover:border-[#d4b88a]'
                      }`}
                    >
                      {pattern.icon}
                      {pattern.name}
                    </button>
                  ))}
                </div>
              </div>

              {mode === 'wire' && (
                <div className="p-5 border-b border-[#d4b88a] bg-amber-100/50">
                  <h2 className="font-bold text-lg mb-3">挑戰難度 (軌道寬度)</h2>
                  <div className="flex gap-2">
                    <button onClick={() => setDifficulty(90)} className={`flex-1 py-2 rounded-lg border-2 ${difficulty === 90 ? 'border-amber-600 bg-amber-200 font-bold' : 'border-amber-200 bg-white'}`}>簡單</button>
                    <button onClick={() => setDifficulty(60)} className={`flex-1 py-2 rounded-lg border-2 ${difficulty === 60 ? 'border-amber-600 bg-amber-200 font-bold' : 'border-amber-200 bg-white'}`}>適中</button>
                    <button onClick={() => setDifficulty(30)} className={`flex-1 py-2 rounded-lg border-2 ${difficulty === 30 ? 'border-amber-600 bg-amber-200 font-bold' : 'border-amber-200 bg-white'}`}>困難</button>
                  </div>
                </div>
              )}

              <div className="p-5 flex-1">
                <h2 className="font-bold text-lg mb-3 flex items-center gap-2 text-stone-700">
                  <Info size={18} />
                  歷史小知識
                </h2>
                <div className="bg-white/60 p-4 rounded-xl leading-relaxed text-sm text-stone-700 shadow-inner">
                  <span className="font-bold block mb-2 text-stone-900">{currentPattern.name}</span>
                  {currentPattern.description}
                </div>
              </div>
            </aside>

            <main className="flex-1 relative flex flex-col">
              <div className="absolute top-4 left-0 right-0 flex justify-center pointer-events-none z-10">
                <div className="bg-white/80 backdrop-blur-sm px-6 py-2 rounded-full shadow-md text-stone-700 font-medium flex items-center gap-2">
                  <Hand size={18} className="text-amber-600" />
                  {mode === 'trace' 
                    ? '請從【起】點開始，按住並沿著虛線畫到【終】點' 
                    : '請從【起】點一筆畫到【終】點，千萬不能超出軌道喔！'}
                </div>
              </div>

              <div 
                ref={containerRef} 
                className="flex-1 m-4 md:m-8 bg-[#e4ccaa] rounded-2xl shadow-inner relative overflow-hidden border-4 border-[#d4b88a] cursor-crosshair"
                style={{ touchAction: 'none' }}
                onPointerDown={handlePointerDown}
                onPointerMove={handlePointerMove}
                onPointerUp={handlePointerUp}
                onPointerLeave={handlePointerUp}
              >
                <canvas ref={canvasRef} className="absolute inset-0 w-full h-full" />
                
                {gameState === 'failed' && (
                  <div className="absolute inset-0 bg-red-500/20 backdrop-blur-[2px] flex items-center justify-center flex-col z-20">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
                      <AlertTriangle size={64} className="text-red-500 mb-4" />
                      <h2 className="text-2xl font-bold text-stone-800 mb-2">哎呀！碰到邊緣了 / 筆拿起來了</h2>
                      <p className="text-stone-500 mb-6">納斯卡線需要專注，再試一次吧！</p>
                      <button 
                        onClick={handleRetry}
                        className="flex items-center gap-2 bg-stone-800 text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-stone-700 transition-colors shadow-lg"
                      >
                        <RefreshCw size={20} />
                        重新挑戰
                      </button>
                    </div>
                  </div>
                )}

                {gameState === 'success' && (
                  <div className="absolute inset-0 bg-green-500/20 backdrop-blur-[2px] flex items-center justify-center flex-col z-20">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
                      <Trophy size={64} className="text-amber-500 mb-4" />
                      <h2 className="text-2xl font-bold text-stone-800 mb-2">恭喜完成！</h2>
                      <p className="text-stone-500 mb-6">你的運筆技巧非常出色，像古代工匠一樣！</p>
                      <button 
                        onClick={handleRetry}
                        className="flex items-center gap-2 bg-amber-500 text-stone-900 px-8 py-3 rounded-full font-bold text-lg hover:bg-amber-400 transition-colors shadow-lg"
                      >
                        <RefreshCw size={20} />
                        再玩一次
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </main>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
